<h1>Notas</h1>

{% if notas %}
<table border="1" style="border-collapse: collapse; width: 50%;">
    <tr>
        <th>Actividad</th>
        <th>Carnet</th>
        <th>Nota</th>
    </tr>

    {% for n in notas %}
    <tr>
        <td>{{ n.actividad }}</td>
        <td>{{ n.carnet }}</td>
        <td>{{ n.nota }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
    <p>No hay notas cargadas.</p>
{% endif %}
